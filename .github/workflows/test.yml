name: CI/CD Tests

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  cypress-tests:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Cloner le dépôt
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Installer Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 14

      # 3️⃣ Installer les dépendances
      - name: Install dependencies
        run: npm install

      # 4️⃣ Lancer le serveur en arrière-plan
      - name: Start server
        run: npm start &

      # 5️⃣ Attendre que le site soit disponible
      - name: Wait for server
        run: npx wait-on http://127.0.0.1:8080/index.html --timeout 60000

      # 6️⃣ Lancer les tests Cypress
      - name: Run Cypress tests
        run: npx cypress run

