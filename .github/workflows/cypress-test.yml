name: CI/CD Cypress Tests
 
on:
  workflow_dispatch:
 
permissions:
  contents: write
 
jobs:
  test:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
 
      - name: Install dependencies
        run: npm ci
 
      - name: Cache Cypress binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/Cypress
          key: ${{ runner.os }}-cypress-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-cypress-
 
      - name: Install Cypress binary
        run: npx cypress install
 
      - name: Install Allure CLI
        run: npm install -g allure-commandline
 
      # Récupération de l'historique depuis gh-pages
      - name: Checkout gh-pages history
        run: |
          git fetch origin gh-pages || true
          if git ls-tree --name-only origin/gh-pages history >/dev/null 2>&1; then
            mkdir -p allure-history
            git checkout origin/gh-pages -- history || true
            cp -r history allure-history/ || true
          fi
 
      - name: Start local server
        run: npx serve -s . -l 8080 &
 
      - name: Wait for server
        run: npx wait-on http://localhost:8080
 
      - name: Run Cypress tests
        run: npm run test
        env:
          CYPRESS_baseUrl: http://localhost:8080
        continue-on-error: true
 
      # Préparer allure-results et restaurer l'historique
      - name: Prepare Allure results
        run: |
          mkdir -p allure-results
          if [ -d "allure-history/history" ]; then
            echo "Restoring Allure history..."
            mkdir -p allure-results/history
            cp -r allure-history/history/* allure-results/history/ || true
          else
            echo "No previous Allure history found"
          fi
 
      - name: Generate Allure report
        run: allure generate allure-results --clean -o allure-report
 
      # Upload artifacts (screenshots / vidéos)
      - name: Upload Cypress artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-artifacts
          path: |
            cypress/screenshots
            cypress/videos
          retention-days: 7
 
      # Upload du rapport Allure
      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          retention-days: 7
 
      # Déploiement GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          publish_branch: gh-pages
          keep_files: false
          commit_message: "ci: deploy Allure report - run #${{ github.run_number }}"
 
      - name: Print report URL
        run: |
          echo "✅ Allure Report disponible sur :"
          echo "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"