name: CI/CD Cypress Tests

on:
  workflow_dispatch:      # permet le lancement manuel
  push:
    branches:
      - bug/bills-bill-payment   # se déclenche automatiquement sur push

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Cache Cypress binary
        uses: actions/cache@v3
        with:
          path: ~/.cache/Cypress
          key: ${{ runner.os }}-cypress-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-cypress-

      - name: Install Cypress binary
        run: npx cypress install

      - name: Start local server
        run: npx serve -s . -l 8080 &

      - name: Wait for server
        run: npx wait-on http://localhost:8080

      - name: Run Cypress Tests
        run: npm run test
        env:
          CYPRESS_baseUrl: http://localhost:8080
        continue-on-error: true   # génère le rapport même si certains tests échouent

      - name: Merge JSON reports
        run: |
          if compgen -G "cypress/reports/mocha/*.json" > /dev/null; then
            npm run merge:reports
          else
            echo "No JSON reports found, skipping merge"
          fi

      - name: Generate HTML report
        run: npm run generate:report || echo "Skipping HTML report generation"

      - name: Upload HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-html-report
          path: cypress/reports/html/
          retention-days: 30

      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: cypress/screenshots/
          retention-days: 7